<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="Register.css">
    <script src="script.js"></script>
</head>
<body>
    <nav>
        <div class="container">
            <div class="item-nav">
                <img src="logo.png" alt="" width="100px">
                <div class="nav-auth">
                    <a href="Login.html" class="regis">เข้าสู่ระบบ</a>
                    <a href="Register.html" class="login">สร้างบัญชี</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="container-login">
                <div class="container-login-item">
                    <h1>สร้างบัญชี</h1>
                    <form action="">
                        <div class="email">
                            <label>อีเมล</label><br>
                            <input type="email" placeholder="กรอกอีเมล">
                        </div>
                        <div class="password">
                            <label>รหัสผ่าน</label>
                            <input type="password" placeholder="กรอกรหัสผ่าน">
                        </div>
                        <div class="conpassword">
                            <label>ยืนยันรหัสผ่าน</label>
                            <input type="password" placeholder="กรอกรหัสผ่าน">
                        </div>
                        <button type="button" onclick="submit()">สร้างบัญชี</button>
                    </form>
                </div>
            </div>
        </div>
    </main>


</body>
</html>
