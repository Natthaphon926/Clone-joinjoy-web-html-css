<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <nav>
        <div class="container">
            <div class="item-nav">
                <img src="logo.png" alt="" width="100px">
                <div class="nav-auth">
                    <a href="Login.html" class="regis">เข้าสู่ระบบ</a>
                    <a href="Register.html" class="login">สร้างบัญชี</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="container-login">
                <div class="container-login-item">
                    <h1>เข้าสู่ระบบ</h1>
                    <form action="">
                        <div class="email">
                            <label>อีเมล</label><br>
                            <input type="email" placeholder="กรอกอีเมล">
                        </div>
                        <div class="password">
                            <label>รหัสผ่าน</label>
                            <input type="password" placeholder="กรอกรหัสผ่าน">
                        </div>
                        <p class="forgetpassword"><a href="#">ลืมรหัสผ่าน</a></p>
                        <button type="submit">เข้าสู่ระบบ</button>
                        <p class="notaccount">ยังไม่มีบัญชี? <a href="Register.html">สมัครเลย</a></p>
                    </form>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
